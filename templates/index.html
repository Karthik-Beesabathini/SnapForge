<!doctype html>
<html>
  <head>
    <title>Photo Booth</title>
    <link rel="stylesheet" href="../static/style.css" />
  </head>

  <body>
    <h1>Photo Collage Booth</h1>
    
    <div class="preview-container">
      <img src="{{ url_for('video_feed') }}" width="640" id="livePreview">
      <div id="countdown" class="countdown"></div>
    </div>
    
    <div class="controls">
        <label for="numPhotos">Number of Photos:</label>
        <select id="numPhotos" class="input">
          <option value="2">2 Photos</option>
          <option value="3">3 Photos</option>
          <option value="4" selected>4 Photos</option>
          <option value="6">6 Photos</option>
        </select>
    </div>

    <br /><br />
    <button onclick="takePhoto()" class="btn" id="captureBtn">Take Photos</button>

    <br /><br />

    
    <div id="photoRectangles" class="rectangles-container"></div>


    <div id="flash" class="flash"></div>

    <br /><br />
    <button onclick="downloadPhoto()" class="btn" id="downloadBtn" disabled>Download Photo</button>

    <br />

    <img id="result" width="600" class="" />

    <script>
      let collectedPhotos = [];

      function takePhoto() {
        const numPhotos = parseInt(document.getElementById("numPhotos").value);
        document.getElementById("captureBtn").disabled = true;
        document.getElementById("downloadBtn").disabled = true;
        collectedPhotos = [];


        const container = document.getElementById("photoRectangles");
        container.innerHTML = "";
        for (let i = 0; i < numPhotos; i++) {
          const rect = document.createElement("div");
          rect.className = "photo-rectangle";
          rect.id = `rect-${i}`;
          rect.textContent = `Photo ${i + 1}`;
          container.appendChild(rect);
        }


        captureSequence(numPhotos, 0);
      }

      function captureSequence(numPhotos, photoIndex) {
        if (photoIndex >= numPhotos) {

          makeCollage(collectedPhotos);
          return;
        }

        const currentRect = document.getElementById(`rect-${photoIndex}`);
        currentRect.classList.add("active");

        let countdown = 3;
        const countdownDiv = document.getElementById("countdown");
        countdownDiv.style.display = "block";
        countdownDiv.textContent = countdown;

        const countdownInterval = setInterval(() => {
          countdown--;
          if (countdown > 0) {
            countdownDiv.textContent = countdown;
          } else {
            clearInterval(countdownInterval);
            countdownDiv.style.display = "none";


            const flash = document.getElementById("flash");
            flash.classList.add("active");
            setTimeout(() => {
              flash.classList.remove("active");
            }, 300);

            
            fetch("/capture?num_photos=1")
              .then((res) => res.blob())
              .then((blob) => {
                const img = new Image();
                img.onload = () => {
                  collectedPhotos.push(img);
                  currentRect.classList.remove("active");
                  currentRect.classList.add("captured");
                  setTimeout(() => {
                    captureSequence(numPhotos, photoIndex + 1);
                  }, 500);
                };
                img.src = URL.createObjectURL(blob);
              });
          }
        }, 1000);
      }

      function makeCollage(images) {
        if (images.length === 0) return;
        const count = images.length;
        const w = images[0].width;
        const h = images[0].height;
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        if (count === 6) {
          canvas.width = w * 3;
          canvas.height = h * 2;
          images.forEach((img, i) => {
            const x = (i % 3) * w;
            const y = Math.floor(i / 3) * h;
            ctx.drawImage(img, x, y, w, h);
          });
        } else if (count === 4) {
          canvas.width = w * 2;
          canvas.height = h * 2;
          images.forEach((img, i) => {
            const x = (i % 2) * w;
            const y = Math.floor(i / 2) * h;
            ctx.drawImage(img, x, y, w, h);
          });
        } else if (count === 3) {
          canvas.width = w * 3;
          canvas.height = h;
          images.forEach((img, i) => {
            ctx.drawImage(img, i * w, 0, w, h);
          });
        } else if (count === 2) {
          canvas.width = w * 2;
          canvas.height = h;
          images.forEach((img, i) => {
            ctx.drawImage(img, i * w, 0, w, h);
          });
        }

        const dataUrl = canvas.toDataURL("image/jpeg");
        document.getElementById("result").src = dataUrl;
        document.getElementById("photoRectangles").innerHTML = "";
        document.getElementById("captureBtn").disabled = false;
        document.getElementById("downloadBtn").disabled = false;

        document.getElementById("downloadBtn").onclick = () => {
          const a = document.createElement("a");
          a.href = dataUrl;
          a.download = "collage.jpg";
          a.click();
        };
      }

      function downloadPhoto() {
        const img = document.getElementById("result").src;
        const a = document.createElement("a");
        a.href = img;
        a.download = "collage.jpg";
        a.click();
      }
    </script>
  </body>
</html>
